services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  chili:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - chili_data:/app/data
      - ./docs:/app/docs
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  chili_data:
