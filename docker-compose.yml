# CHILI full stack — see docs/DOCKER_FULL_STACK.md
#
# Logical groups (single file, no extra infra for neural mesh v1):
#   1) Foundation: postgres, ollama
#   2) App / control plane: chili (FastAPI), brain (HTTP delegate)
#   3) Minimal trading runtime: broker-sync-worker, autotrader-worker,
#      fast-scan-worker, market-snapshot-worker.
#   4) Heavy/offline lanes live behind profiles so Docker Desktop restarts do not
#      resurrect every memory-heavy worker at once.
#      Use: docker compose --profile heavy-workers up -d scheduler-worker brain-worker backtest-worker brain-work-dispatcher
#      Use: docker compose --profile fast-path up -d fast-data-worker
#
# Note: fast-scan-worker remains in the normal stack so activity discovery keeps
# running after ordinary stack restarts. Heavy queue/research workers are opt-in;
# this prevents a Docker Desktop crash loop from auto-starting the full fleet
# before Postgres and the web/API have stabilized.
#
# Bind-mounted services that can touch live broker state default to restart=no.
# This keeps a dirty local checkout from auto-resurrecting live order code after
# an operator stops it. Safe support lanes below (API, fast scan, market
# snapshots) restart unless-stopped so freshness does not silently die after a
# transient container exit.
#
# Persistent data defaults to D:/CHILI-Docker/{postgres,ollama,chili-data} so
# large state lives off C:. Postgres can be moved to a Docker named volume after
# a deliberate migration by setting CHILI_POSTGRES_DATA_SOURCE=chili-postgres-data.
services:
  postgres:
    # Keep in sync with typical dev installs (e.g. local Postgres 16); simplifies pg_dump/restore.
    image: postgres:16-alpine
    # The D: bind mount already carries postgres ownership; running the
    # service as postgres avoids the image entrypoint's slow recursive chown
    # scan before startup.
    user: postgres
    # Headroom for chili + brain + brain-worker; process-pool queue uses P * (child pool) connections.
    # Docker Desktop host-mounted data directories can make Postgres' default
    # per-file crash-recovery fsync walk painfully slow when stale test DBs
    # accumulate. Use syncfs so Linux asks the backing filesystem to flush the
    # data/WAL filesystems in one pass; see the recovery runbook before changing.
    command: ["postgres", "-c", "max_connections=350", "-c", "recovery_init_sync_method=syncfs"]
    restart: unless-stopped
    stop_grace_period: 180s
    environment:
      POSTGRES_USER: chili
      POSTGRES_PASSWORD: chili
      POSTGRES_DB: chili
    volumes:
      - ${CHILI_POSTGRES_DATA_SOURCE:-D:/CHILI-Docker/postgres}:/var/lib/postgresql/data
    ports:
      # Host port 5433 avoids clashing with a local PostgreSQL on 5432.
      # From the host: postgresql://chili:chili@localhost:5433/chili
      - "5433:5432"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_controldata /var/lib/postgresql/data | grep -q 'Database cluster state:.*in production'"]
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 300s
    deploy:
      resources:
        limits:
          # Bumped 2.0->3.0 CPU and 1G->2G memory (2026-04-27): brain-worker
          # was hammering postgres with the 5-sec lean-cycle loop and the
          # default 1G left no room for shared_buffers + work_mem headroom,
          # which surfaced as ALTER TABLE locks on scan_patterns timing out
          # in migrations.
          cpus: "3.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - D:/CHILI-Docker/ollama:/root/.ollama
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    # ollama image has no curl/wget; use CLI against the local daemon
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 6G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Planner coding validation (Phase 1+): for Docker dev parity, use the Phase 4 mount below
  # (/workspace) + CODE_BRAIN_REPOS=/workspace. For prod-like runs, omit the repo mount and bake
  # paths intentionally; do not rely on host bind mounts outside local dev.
  #
  # After changing app/*.py or app/services/*, either: ``docker compose build chili`` or rely on
  # the ./app bind mount below (local dev). Stale images ignore CHILI_SCHEDULER_ROLE=none handling.
  #
  # Worker I/O: CHILI_CONTAINER_CPU_LIMIT + CHILI_RUNNING_IN_DOCKER align thread pools with deploy.cpus
  # when cgroup quota is invisible (Docker Desktop). See brain_io_concurrency.py.
  chili:
    build:
      context: .
      args:
        CHILI_GIT_COMMIT: ${CHILI_GIT_COMMIT:-}
    image: chili-app:local
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Must use service hostname `postgres`; overrides DATABASE_URL from .env when using Compose.
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      # LOCAL DEV ONLY — overrides host .env paths that do not exist inside Linux containers.
      # Must match the read-only checkout mount target below (/workspace).
      - CODE_BRAIN_REPOS=/workspace
      - CHILI_HOST_DEV_ROOTS=D:/dev
      # HTTPS in the container (self-signed). Hardcoded so host .env cannot accidentally
      # set CHILI_TLS=0 and break https:// in the browser (PR_END_OF_FILE_ERROR).
      # For plain HTTP in Docker, use: docker compose run -e CHILI_TLS=0 … or a compose override.
      - CHILI_TLS=1
      # Scanner/prescreener batch OHLCV: Massive-only (no Polygon/yfinance log spam).
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      # No APScheduler in Uvicorn: all cron jobs run in ``scheduler-worker`` (see CHILI_SCHEDULER_ROLE there).
      # Also disables Massive WebSocket in this process (continuous quote stream); trading UI uses REST polling.
      - CHILI_SCHEDULER_ROLE=none
      # Tell operator readiness that a scheduler-worker runs web-light jobs externally.
      - CHILI_SCHEDULER_RUNS_EXTERNALLY=1
      # Local Autopilot default: paper sessions can advance without extra env setup.
      # Live runner must be an explicit operator decision; do not let a compose/web
      # restart silently resurrect live order code.
      - CHILI_MOMENTUM_PAPER_RUNNER_ENABLED=1
      - CHILI_MOMENTUM_PAPER_RUNNER_SCHEDULER_ENABLED=1
      - CHILI_MOMENTUM_LIVE_RUNNER_ENABLED=0
      - CHILI_MOMENTUM_LIVE_RUNNER_SCHEDULER_ENABLED=0
      # Trading Brain desk: neural mesh graph + APIs (overrides host .env when unset/false).
      - TRADING_BRAIN_NEURAL_MESH_ENABLED=1
      - TRADING_BRAIN_GRAPH_MODE=neural
      # Autopilot real-time streaming: price bus + Coinbase WS for crypto quotes.
      - CHILI_AUTOPILOT_PRICE_BUS_ENABLED=1
      - CHILI_COINBASE_WS_ENABLED=1
      - CHILI_FAST_PATH_COST_AWARE_LIVE_FEE_ENABLED=${CHILI_FAST_PATH_COST_AWARE_LIVE_FEE_ENABLED:-1}
      # 2026-04-28: raised from default 0.75 → 0.85 per operator. Same
      # value also set in scheduler-worker (where the autotrader runs);
      # mirrored here for any chili-side consumer of portfolio_risk.
      # See scheduler-worker block for full rationale.
      - BRAIN_RISK_MAX_AVG_CORRELATION=0.85
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./docs:/app/docs
      # Keep application code image-backed: this service auto-restarts, so a
      # dirty bind-mounted checkout must not become the live API runtime.
      # Local dev can use scripts/start-dev.ps1 for bind-mounted app code.
      # LOCAL DEV ONLY — writable host checkout at /workspace for Project Autopilot
      # worktrees/branches and in-container coding validation (CODE_BRAIN_REPOS=/workspace).
      # Omit for production-like deploys.
      - .:/workspace
      # LOCAL DEV - expose sibling repos under D:\dev for Code Brain registration.
      - D:/dev:/host_dev
      # Brain Worker UI controls the separate ``brain-worker`` service — needs engine access
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import ssl,urllib.request; urllib.request.urlopen('https://localhost:8000/healthz',context=ssl._create_unverified_context())\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          # 2026-05-04 (f-leak-3): bumped 3G -> 5G defensively while the
          # yfinance Thread-closure leak fix soaks. Allows headroom for
          # the next leak event (if any) before OOM-restart kicks in.
          # Revisit after a 24h+ clean window -- if mem_watcher confirms
          # no leak, drop back to 3G.
          memory: 5G
        reservations:
          cpus: "1.0"
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # Brain HTTP service (strangler — see chili-brain/README.md).
  # Behind ``brain-http`` profile: not started by default since CHILI_USE_BRAIN_SERVICE defaults to 0.
  # Start with: docker compose --profile brain-http up brain
  brain:
    build:
      context: .
      dockerfile: chili-brain/Dockerfile
    image: chili-brain:local
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - CHILI_BRAIN_INTERNAL_SECRET=${CHILI_BRAIN_INTERNAL_SECRET:-changeme}
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
    profiles:
      - brain-http
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # Neural processing (default): full ``run_learning_cycle`` + subtasks; optional neural mesh batch
  # after each successful cycle when TRADING_BRAIN_NEURAL_MESH_ENABLED=1.
  brain-worker:
    image: chili-app:local
    profiles:
      - heavy-workers
    restart: "${CHILI_HEAVY_WORKER_RESTART_POLICY:-no}"
    labels:
      com.chili.service: brain-worker
      com.chili.entrypoint: brain_worker_lean_cycle
    command: ["python", "scripts/brain_worker.py", "--mode", "lean-cycle", "--interval", "5"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - CHILI_USE_BRAIN_SERVICE=${CHILI_USE_BRAIN_SERVICE:-0}
      - BRAIN_SERVICE_URL=${BRAIN_SERVICE_URL:-http://brain:8090}
      - BRAIN_INTERNAL_SECRET=${CHILI_BRAIN_INTERNAL_SECRET:-changeme}
      - DATABASE_POOL_SIZE=8
      - DATABASE_MAX_OVERFLOW=12
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      - TRADING_BRAIN_NEURAL_MESH_ENABLED=1
      - TRADING_BRAIN_GRAPH_MODE=neural
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=5
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./app:/app/app
      # Round-19 (2026-04-30): mount scripts/ -- workers loading scripts/*.py would otherwise run baked-in copies.
      - ./scripts:/app/scripts
      # Round-18 (2026-04-30): mount scripts so changes to brain_worker.py
      # take effect on container restart without an image rebuild.
      # Previously scripts/ was baked into the image at build time, so
      # `force-recreate` kept running stale code -- the R18 audit-helper
      # additions silently never loaded until this mount was added.
      - ./scripts:/app/scripts
    depends_on:
      chili:
        condition: service_started
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Bumped 4G->8G memory (2026-04-27): brain-worker was running at
          # 99.87% memory (3.99G/4G) which triggered Python GC thrashing
          # (CPU at 138% on the 5-sec lean-cycle loop) and starved
          # connections to postgres. The neural mesh batch grew enough
          # over the past 30 days that 4G is no longer adequate.
          cpus: "5.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Lightweight brain_work_events fast lane. Keeps CPCV, promotion, and
  # evidence handlers draining even when the main brain-worker is busy in
  # mining/backtest/OHLCV work. Heavy producers stay on brain-worker.
  brain-work-dispatcher:
    image: chili-app:local
    profiles:
      - heavy-workers
    restart: "${CHILI_HEAVY_WORKER_RESTART_POLICY:-no}"
    command: ["python", "scripts/brain_work_fast_lane.py", "--interval", "10", "--max-cpcv-gate", "4"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_POOL_SIZE=4
      - DATABASE_MAX_OVERFLOW=6
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=1
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./app:/app/app
      - ./scripts:/app/scripts
    depends_on:
      chili:
        condition: service_started
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Continuous pattern mining worker. Discovers new ScanPatterns and feeds the backtest queue.
  mining-worker:
    image: chili-app:local
    restart: "${CHILI_BIND_MOUNTED_SERVICE_RESTART_POLICY:-no}"
    command: ["python", "scripts/brain_worker.py", "--mode", "mining"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_POOL_SIZE=4
      - DATABASE_MAX_OVERFLOW=6
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=3
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./app:/app/app
      # Round-19 (2026-04-30): mount scripts/ -- workers loading scripts/*.py would otherwise run baked-in copies.
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 3G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Continuous backtest worker. Drains the ScanPattern queue with walk-forward backtests.
  backtest-worker:
    image: chili-app:local
    profiles:
      - heavy-workers
    restart: "${CHILI_HEAVY_WORKER_RESTART_POLICY:-no}"
    command: ["python", "scripts/brain_worker.py", "--mode", "backtest"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - DATABASE_POOL_SIZE=6
      - DATABASE_MAX_OVERFLOW=10
      # Normal queue owner. Mirrors brain_worker backtest-mode default while
      # keeping lean-cycle overrides separate from the dedicated worker.
      - CHILI_BRAIN_FAST_BACKTEST_BATCH=${CHILI_BACKTEST_WORKER_FAST_BACKTEST_BATCH:-30}
      - BRAIN_QUEUE_BACKTEST_EXECUTOR=${BRAIN_QUEUE_BACKTEST_EXECUTOR:-process}
      - BRAIN_QUEUE_PROCESS_CAP=${BRAIN_BACKTEST_WORKER_PROCESS_CAP:-8}
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=5
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./app:/app/app
      # Round-19 (2026-04-30): mount scripts/ -- workers loading scripts/*.py would otherwise run baked-in copies.
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "5.0"
          memory: 5G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Fast scan worker. 1-5 min breakout/momentum detection on promoted patterns, fires alerts.
  fast-scan-worker:
    image: chili-app:local
    restart: unless-stopped
    command: ["python", "scripts/brain_worker.py", "--mode", "fast-scan", "--interval", "${CHILI_FAST_SCAN_INTERVAL_MINUTES:-1}"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - DATABASE_POOL_SIZE=4
      - DATABASE_MAX_OVERFLOW=4
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=2
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      # Auto-restart lane: run image-backed app/scripts code so dirty local
      # checkout changes cannot alter alert scanning after a container restart.
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Market snapshot worker. Keeps trading_snapshots fresh for HRP sizing,
  # cash-deployment reliability, pattern mining, and setup vitals without
  # requiring the full heavy scheduler/research profile.
  market-snapshot-worker:
    image: chili-app:local
    restart: unless-stopped
    labels:
      com.chili.service: market-snapshot-worker
      com.chili.entrypoint: scheduler_worker_market_snapshots
    command: ["python", "scripts/scheduler_worker.py"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      - CHILI_SCHEDULER_ROLE=market_snapshot_only
      - CHILI_SCHEDULER_EMIT_HEARTBEAT=1
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=2
      - DATABASE_POOL_SIZE=4
      - DATABASE_MAX_OVERFLOW=4
      - PYTHONUNBUFFERED=1
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      # Auto-restart lane: run image-backed app/scripts code so dirty local
      # checkout changes cannot alter snapshot maintenance after a restart.
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Heavy APScheduler jobs (scans, code/reasoning cycles, research lanes).
  # ``chili`` uses role ``none``; broker/autotrader hot paths have their own workers.
  scheduler-worker:
    image: chili-app:local
    profiles:
      - heavy-workers
    restart: "${CHILI_HEAVY_WORKER_RESTART_POLICY:-no}"
    labels:
      com.chili.service: scheduler-worker
      com.chili.entrypoint: scheduler_worker
    command: ["python", "scripts/scheduler_worker.py"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      # FIX 45a (2026-04-29): split autotrader into its own container. This
      # service drops to ``cron_only`` so it stops registering autotrader tick
      # (every 10s) + monitor (every 30s). Autotrader now runs in
      # ``autotrader-worker`` below — its broker-call hot loop is isolated
      # and can't pollute scanners' network state or share fate with leak-
      # prone cron jobs. Original role: ``all``. Revert to ``all`` if you
      # want the legacy single-container behavior back.
      - CHILI_SCHEDULER_ROLE=cron_only
      - CHILI_SCHEDULER_EMIT_HEARTBEAT=1
      # DO NOT REMOVE — required for CHILI Dispatch (Phase D.1+)
      - CHILI_DISPATCH_ENABLED=1
      - CHILI_DISPATCH_MODE=sandboxed
      - CHILI_DISPATCH_TASK_STATUSES=ready_for_dispatch
      # Phase E.1 — autonomous commit + push (default OFF; flip the
      # CHILI_DISPATCH_GIT_PUSH_ENABLED value in .env to 1 when you're
      # ready to actually publish dispatch branches to GitHub).
      - CHILI_DISPATCH_GIT_PUSH_ENABLED=${CHILI_DISPATCH_GIT_PUSH_ENABLED:-0}
      - CHILI_DISPATCH_GITHUB_TOKEN=${CHILI_DISPATCH_GITHUB_TOKEN:-}
      - CHILI_DISPATCH_GIT_REMOTE_USER=${CHILI_DISPATCH_GIT_REMOTE_USER:-}
      - CHILI_DISPATCH_GIT_BASE_BRANCH=${CHILI_DISPATCH_GIT_BASE_BRANCH:-main}
      - CHILI_MOMENTUM_PAPER_RUNNER_ENABLED=1
      - CHILI_MOMENTUM_PAPER_RUNNER_SCHEDULER_ENABLED=1
      # Live runner must be opted in by the operator. This prevents a generic
      # scheduler-worker restart from becoming a live trading restart.
      - CHILI_MOMENTUM_LIVE_RUNNER_ENABLED=0
      - CHILI_MOMENTUM_LIVE_RUNNER_SCHEDULER_ENABLED=0
      # Bumped from 15/25 → 25/50 because trading scheduler bursts (auto trader
      # tick, paper runner, neural mesh, bracket reconciliation, market data
      # integrity) intermittently exhausted the pool, blocking dispatch's LLM
      # logger writes and code_agent_runs updates. Postgres default is 100
      # max_connections so 75 from this service still leaves headroom for the
      # web service + ad-hoc psql access. (Phase D.2.7+ ops note 2026-04-26.)
      - DATABASE_POOL_SIZE=25
      - DATABASE_MAX_OVERFLOW=50
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      - TRADING_BRAIN_NEURAL_MESH_ENABLED=1
      - TRADING_BRAIN_GRAPH_MODE=neural
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=4
      - PYTHONUNBUFFERED=1
      # Autopilot real-time streaming: price bus + Coinbase WS in scheduler for event-driven runner.
      - CHILI_AUTOPILOT_PRICE_BUS_ENABLED=1
      - CHILI_COINBASE_WS_ENABLED=1
      # FIX 33 (deep audit 2026-04-28): autotrader_v1 tick uses
      # ThreadPoolExecutor with timeout that ABANDONS the worker thread
      # on timeout (trading_scheduler.py:1714-1726). Each abandoned
      # thread keeps its db = SessionLocal() open until eventual
      # completion, leading to idle-in-tx pile-up (saw 63 sessions
      # held 30-100s each). Lowering tick budget 45s -> 15s makes
      # abandoned threads die faster, cutting accumulation rate by 3x.
      # Combined with FIX 32's 600s watchdog kill for non-brain-worker
      # apps, this keeps total sessions well under the 80-session pool
      # ceiling. max_instances=1 also helps — we never benefit from
      # parallel autotrader ticks (same broker, same alert queue).
      - CHILI_AUTOTRADER_TICK_MAX_SECONDS=15
      - CHILI_AUTOTRADER_TICK_MAX_INSTANCES=1
      # 2026-04-28: raised from default 0.75 → 0.85 per operator. With
      # 2 open crypto positions (AAVE-USD, RAY-USD) the avg correlation
      # of any new crypto candidate (1INCH/ADA/SAND etc) was 0.76 —
      # JUST over the 0.75 limit, blocking 5+ entries in last 4h. 0.85
      # gives ~10% headroom over observed values while still catching
      # extreme concentration cases (>0.90). Source:
      # app/services/trading/portfolio_risk.py:46.
      - BRAIN_RISK_MAX_AVG_CORRELATION=0.85
      # Round-12 (2026-04-30) FIX #2: switch backtest queue executor to
      # process pool. The actual backtest worker runs as a daemon thread
      # in scheduler-worker (FIX 34); without this env, it defaults to
      # threads = GIL-bound on the indicator-compute portion. process
      # mode gives true CPU parallelism. Cap workers at 6 (matches the
      # cpus limit below) so the process pool doesn't blow memory.
      - BRAIN_QUEUE_BACKTEST_EXECUTOR=process
      - BRAIN_QUEUE_PROCESS_CAP=6
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./app:/app/app
      # Round-19 (2026-04-30): mount scripts/ -- workers loading scripts/*.py would otherwise run baked-in copies.
      - ./scripts:/app/scripts
      # DO NOT REMOVE — required for CHILI Dispatch (Phase D.2+)
      # Read-write project root: dispatch loop calls `git worktree add` here.
      # Read-only would block git's index/worktree metadata writes (.git/worktrees/...).
      # Worktrees themselves are created under CHILI_DISPATCH_WORKTREE_DIR (defaults
      # to /tmp/chili-dispatch) which lives inside the container, NOT in this mount.
      - .:/workspace
      # Phase E.2 — multi-repo support. Wide mount so the brain can address any
      # local project under D:\dev\... by host path (resolver maps it to
      # /host_dev/<project>). Without this, adding a new local project would
      # require a docker-compose edit + recreate; with it, the resolver just
      # detects the host path, computes /host_dev/<project>, and registers a
      # code_repos row. No restart needed for new projects.
      - D:/dev:/host_dev
      # D-backed workspace for repos that the brain clones on demand. Keep this
      # outside Docker's named volume store so clone churn does not grow C:.
      - D:/CHILI-Docker/dispatch-clones:/workspace_managed
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        # 2026-04-27 — bumped 4G → 10G + 4 → 6 CPU. scheduler-worker
        # was at 95% RAM (3.65/4G) before adding options work
        # (synthesis chain queries hit RH chains every tick + exit
        # monitor adds another sweep over open option positions).
        # Match brain-worker's 8G envelope, slightly higher to give
        # the option chain queries headroom. Same shape as KK's
        # postgres/brain-worker bump pattern.
        limits:
          cpus: "6.0"
          memory: 10G
        reservations:
          cpus: "1.5"
          memory: 2G

  # Momentum live execution lane. Ross equity momentum is a live, tick-driven
  # lane when this profile is launched; broad equities are still blocked by the
  # Ross universe gate below and crypto/autotrader remain disabled.
  # this service is the controlled replacement for ad-hoc
  # ``chili-clean-recovery-momentum-exec`` containers. It runs only the
  # momentum_exec_only scheduler role.
  momentum-exec-worker:
    image: ${CHILI_MOMENTUM_EXEC_IMAGE:-chili-app:local}
    container_name: chili-clean-recovery-momentum-exec
    profiles:
      - live-momentum
    restart: "${CHILI_MOMENTUM_EXEC_RESTART_POLICY:-unless-stopped}"
    labels:
      com.chili.service: momentum-exec-worker
      com.chili.entrypoint: scheduler_worker
      com.chili.lane: momentum_exec_only
    command: ["python", "scripts/scheduler_worker.py"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "scripts/verify_momentum_exec_process_health.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - CHILI_SCHEDULER_ROLE=momentum_exec_only
      - CHILI_SCHEDULER_EMIT_HEARTBEAT=1
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=2
      - PYTHONUNBUFFERED=1
      - CHILI_AUTOTRADER_ENABLED=false
      - CHILI_AUTOTRADER_CRYPTO_ENABLED=false
      - COINBASE_AUTOTRADER_LIVE=0
      - CHILI_COINBASE_AUTOTRADER_LIVE=0
      - CHILI_MOMENTUM_LIVE_RUNNER_ENABLED=${CHILI_MOMENTUM_EXEC_LIVE_RUNNER_ENABLED:-true}
      - CHILI_MOMENTUM_LIVE_RUNNER_SCHEDULER_ENABLED=${CHILI_MOMENTUM_EXEC_LIVE_RUNNER_SCHEDULER_ENABLED:-false}
      - CHILI_MOMENTUM_LIVE_RUNNER_LOOP_ENABLED=${CHILI_MOMENTUM_EXEC_LIVE_RUNNER_LOOP_ENABLED:-true}
      - CHILI_MOMENTUM_LIVE_RUNNER_LOOP_IQFEED_TAPE_ENABLED=${CHILI_MOMENTUM_EXEC_IQFEED_TAPE_ENABLED:-true}
      - CHILI_MOMENTUM_LIVE_RUNNER_LOOP_IQFEED_NOTIFY_ENABLED=${CHILI_MOMENTUM_EXEC_IQFEED_NOTIFY_ENABLED:-true}
      - CHILI_MOMENTUM_LIVE_RUNNER_LOOP_IQFEED_POLL_FALLBACK_ENABLED=${CHILI_MOMENTUM_EXEC_IQFEED_POLL_FALLBACK_ENABLED:-true}
      - CHILI_MOMENTUM_LIVE_RUNNER_LOOP_IQFEED_POLL_SECONDS=${CHILI_MOMENTUM_EXEC_IQFEED_POLL_SECONDS:-0.25}
      - CHILI_MOMENTUM_LIVE_RUNNER_BATCH_FALLBACK_ENABLED=${CHILI_MOMENTUM_EXEC_BATCH_FALLBACK_ENABLED:-false}
      - CHILI_MOMENTUM_ROSS_EVENT_ADMISSION_ENABLED=${CHILI_MOMENTUM_EXEC_ROSS_EVENT_ADMISSION_ENABLED:-true}
      - CHILI_MOMENTUM_AUTO_ARM_LIVE_ENABLED=${CHILI_MOMENTUM_EXEC_AUTO_ARM_LIVE_ENABLED:-true}
      - CHILI_MOMENTUM_AUTO_ARM_LIVE_SCHEDULER_ENABLED=${CHILI_MOMENTUM_EXEC_AUTO_ARM_SCHEDULER_ENABLED:-false}
      - CHILI_MOMENTUM_AUTO_ARM_LIVE_SCHEDULER_FALLBACK_ENABLED=${CHILI_MOMENTUM_EXEC_AUTO_ARM_SCHEDULER_FALLBACK_ENABLED:-false}
      - CHILI_MOMENTUM_ROSS_EQUITY_UNIVERSE_REQUIRED=${CHILI_MOMENTUM_EXEC_ROSS_EQUITY_UNIVERSE_REQUIRED:-true}
      - CHILI_EQUITY_EXECUTION_RAIL=${CHILI_EQUITY_EXECUTION_RAIL:-robinhood_agentic_mcp}
      - CHILI_MOMENTUM_PULLBACK_ENTRY_INTERVAL=${CHILI_MOMENTUM_PULLBACK_ENTRY_INTERVAL:-1m}
      - CHILI_MOMENTUM_EARLY_PREMARKET_MIN_MOVERS=${CHILI_MOMENTUM_EARLY_PREMARKET_MIN_MOVERS:-1}
      # Load-bearing Ross runner/add/exit controls. These are intentionally
      # durable on the canonical momentum worker so a rebuild cannot silently
      # drop the behavior currently enabled on the live container.
      - CHILI_MOMENTUM_TICK_FIRST_PULLBACK_ENABLED=${CHILI_MOMENTUM_TICK_FIRST_PULLBACK_ENABLED:-true}
      # OPERATOR DIRECTIVE 2026-07-04 (capture-gap G1a, PR #837): micropull default ON —
      # the 15s micro-frame first-pullback path; replay-verified on SVRE 06-30.
      - CHILI_MOMENTUM_MICROPULL_ENABLED=${CHILI_MOMENTUM_MICROPULL_ENABLED:-true}
      - CHILI_MOMENTUM_MICRO_PULLBACK_PRIMARY_ENABLED=${CHILI_MOMENTUM_MICRO_PULLBACK_PRIMARY_ENABLED:-true}
      - CHILI_MOMENTUM_MICROPULL_BAR_SECONDS=${CHILI_MOMENTUM_MICROPULL_BAR_SECONDS:-15}
      - CHILI_MOMENTUM_MIDDAY_DEWEIGHT_ENABLED=${CHILI_MOMENTUM_MIDDAY_DEWEIGHT_ENABLED:-true}
      - CHILI_MOMENTUM_PYRAMID_ENABLED=${CHILI_MOMENTUM_PYRAMID_ENABLED:-true}
      - CHILI_MOMENTUM_PYRAMID_DISCRETE_ADD_ENABLED=${CHILI_MOMENTUM_PYRAMID_DISCRETE_ADD_ENABLED:-true}
      - CHILI_MOMENTUM_PYRAMID_SKIP_VIABILITY_RECHECK=${CHILI_MOMENTUM_PYRAMID_SKIP_VIABILITY_RECHECK:-true}
      - CHILI_MOMENTUM_PYRAMID_ADD_SUBMIT_RETRY_MAX=${CHILI_MOMENTUM_PYRAMID_ADD_SUBMIT_RETRY_MAX:-2}
      - CHILI_MOMENTUM_SCALE_GRID_ENABLED=${CHILI_MOMENTUM_SCALE_GRID_ENABLED:-true}
      - CHILI_MOMENTUM_ADD_INTO_HALT_ENABLED=${CHILI_MOMENTUM_ADD_INTO_HALT_ENABLED:-true}
      - CHILI_MOMENTUM_STOP_L2_CONFIRM_ENABLED=${CHILI_MOMENTUM_STOP_L2_CONFIRM_ENABLED:-true}
      - CHILI_MOMENTUM_EXIT_OFI_LOCK_PARTIAL_ENABLED=${CHILI_MOMENTUM_EXIT_OFI_LOCK_PARTIAL_ENABLED:-false}
      - CHILI_MOMENTUM_EXIT_OFI_HIDDEN_SELLER_ENABLED=${CHILI_MOMENTUM_EXIT_OFI_HIDDEN_SELLER_ENABLED:-false}
      - CHILI_MOMENTUM_CATALYST_CONVICTION_ENABLED=${CHILI_MOMENTUM_CATALYST_CONVICTION_ENABLED:-false}
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      # OPERATOR DIRECTIVE 2026-07-03: NO code bind-mounts on the live exec worker —
      # the IMAGE code (CHILI_MOMENTUM_EXEC_IMAGE, main-lineage) is what runs; intraday
      # hot-edits are ended. See docs/STRATEGY/CC_REPORTS/2026-07-02_master-fix-plan-ross-parity.md.
      - chili_rh_agentic_secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 512M

  # FIX 45b (2026-04-29): broker-sync hot lane. Owns ALL broker-call jobs:
  # Robinhood order+position sync, bracket reconciliation, stuck-order
  # watchdog, execution-event lag gauge, drift escalation watchdog,
  # day-trade fast stop monitor, crypto stop-loss monitor. These all hit
  # external broker APIs at high cadence; isolating them gives:
  #   * Single network egress lane for broker traffic. If host firewall
  #     rate-limits the source IP, ONLY this container is affected.
  #   * Independent restart granularity. Broker reconciliation issue?
  #     Restart broker-sync-worker without disturbing scanners or autotrader.
  #   * Clean memory profile. If RSS grows steadily here, leak source is
  #     in the broker-sync code path; isolated bisection.
  broker-sync-worker:
    image: chili-app:local
    restart: "${CHILI_BIND_MOUNTED_SERVICE_RESTART_POLICY:-no}"
    labels:
      com.chili.service: broker-sync-worker
      com.chili.entrypoint: scheduler_worker
    command: ["python", "scripts/scheduler_worker.py"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - CHILI_SCHEDULER_ROLE=broker_sync_only
      - CHILI_SCHEDULER_EMIT_HEARTBEAT=0
      - DATABASE_POOL_SIZE=12
      - DATABASE_MAX_OVERFLOW=20
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=2
      - PYTHONUNBUFFERED=1
      # FIX 33 carry-over for broker-call timeouts.
      - CHILI_AUTOTRADER_TICK_MAX_SECONDS=15
      - CHILI_AUTOTRADER_TICK_MAX_INSTANCES=1
      # 2026-05-01 RE-ENABLED after Phase 4 post-placement verification.
      # bracket_writer_g2 now polls broker truth (verify_order_landed,
      # 3s window) before claiming success. Three verdicts: resting →
      # CONFIRMED_AT_BROKER, rejected → mark_terminal_reject (no retry
      # storm), unknown → conservative (no state change, next sweep
      # re-checks). The "API returned an order_id, must be working"
      # gap that produced the ELTX false-success on 2026-05-01 17:50
      # is now closed — every place_missing_stop now confirms with the
      # broker before declaring success.
      - CHILI_BRACKET_WRITER_G2_PLACE_MISSING_STOP=1
      # 2026-05-03 emergency repair branch for trade-open + missing_stop +
      # intent_state=terminal_reject. Migration 222 + emergency-repair logic
      # in bracket_reconciliation_service. Enabled to repair 6 unprotected
      # equity positions (AIDX, CCCC, CRDL, ELTX, TLS, VFS) by placing real
      # broker stops via FIX-51 writer. IMTX has reconciled to kind=agree
      # and is unaffected. 6h throttle prevents repair storms.
      - CHILI_BRACKET_MISSING_STOP_REPAIR_ENABLED=1
      # 2026-05-03 bracket-intent-stale-label-cleanup. Mirrors
      # BrokerView.stop_order_id into local advisory cache and auto-
      # transitions terminal_reject -> reconciled when classifier says
      # kind=agree on a subsequent sweep. Closes the stale-label loop
      # left by the emergency-repair task: 6 of 7 rows had broker
      # protection but local intent_state was stuck. DB-only writes;
      # no broker calls. Default OFF; flipped here after CC report
      # acknowledged the structural gap.
      - CHILI_BRACKET_INTENT_MIRROR_ENABLED=1
      # 2026-05-04 bracket-writer-respect-upside-targets: forced back to 0.
      # On the prior task's 2026-05-04 19:14 deploy this was hot and the
      # writer cancelled 5 operator-authored covering limit-sells (profit
      # targets at +17% to +200% above entry on AIDX/CCCC/CRDL/TLS/VFS)
      # to free shares for SELL_STOPs. The operator did not authorize the
      # strategy shift; the writer was treating the one-sell-per-share
      # constraint as license to make policy decisions rather than a fact
      # requiring operator input. Going forward the writer surfaces the
      # conflict as a pending-decision row in trading_bracket_intents.
      # payload_json instead of unilaterally cancelling. Operator decides
      # via POST /api/admin/bracket-decisions/<id>. This env var should
      # NOT be flipped to 1 again -- the pending-decision surface is the
      # single decision point going forward.
      - CHILI_BRACKET_WRITER_CANCEL_COVERING_SELL=0
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./app:/app/app
      # Round-19 (2026-04-30): mount scripts/ -- workers loading scripts/*.py would otherwise run baked-in copies.
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        # Tight envelope to surface leaks. Broker sync is small workload —
        # if it hits 4G, something is wrong.
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 768M

  # FIX 45a (2026-04-29): dedicated autotrader hot loop. Isolates the autotrader
  # tick (every 10s) + monitor (every 30s) from the slow cron jobs in
  # scheduler-worker. Rationale:
  #   * The autotrader's broker calls (Robinhood + Coinbase) run 6× per minute.
  #     If the host firewall rate-limits the source IP because of failed retry
  #     storms, only THIS container is affected — scanners + snapshots in
  #     scheduler-worker keep their network egress intact.
  #   * Memory leaks in the tick code path are visible immediately (small
  #     container, single workload) instead of buried under 30 other jobs.
  #   * A restart of autotrader-worker doesn't disturb scanners, momentum
  #     runner, or bracket reconciliation.
  #   * Tighter resource limits (3G mem, 2 CPU) force the leak surface; if it
  #     OOMs, only autotrader is affected and Compose auto-restarts.
  autotrader-worker:
    image: chili-app:local
    restart: "${CHILI_BIND_MOUNTED_SERVICE_RESTART_POLICY:-no}"
    labels:
      com.chili.service: autotrader-worker
      com.chili.entrypoint: scheduler_worker
    command: ["python", "scripts/scheduler_worker.py"]
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - CHILI_SCHEDULER_ROLE=autotrader_only
      - CHILI_SCHEDULER_EMIT_HEARTBEAT=0
      - DATABASE_POOL_SIZE=10
      - DATABASE_MAX_OVERFLOW=15
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=true
      - CHILI_RUNNING_IN_DOCKER=1
      - CHILI_CONTAINER_CPU_LIMIT=2
      - PYTHONUNBUFFERED=1
      # Autopilot real-time streaming: same env as scheduler-worker had.
      - CHILI_AUTOPILOT_PRICE_BUS_ENABLED=1
      - CHILI_COINBASE_WS_ENABLED=1
      # AutoTrader entry ticks share broker state, paper-shadow capacity,
      # and the same alert queue. Keep the dedicated worker single-instance;
      # advisory locks are a last line of defense, not a scheduling strategy.
      # Live ticks can exceed the old 10s default, so avoid scheduler skip storms.
      - CHILI_AUTOTRADER_TICK_INTERVAL_SECONDS=60
      - CHILI_AUTOTRADER_MONITOR_INTERVAL_SECONDS=60
      - CHILI_AUTOTRADER_TICK_MAX_SECONDS=15
      - CHILI_AUTOTRADER_TICK_MAX_INSTANCES=1
      - BRAIN_RISK_MAX_AVG_CORRELATION=0.85
      # f-add-paper-shadow-mode (mig 229, 2026-05-06): enable per-trade
      # paper-shadow alongside live for execution-alpha-drag measurement.
      # Every live decision (placed/blocked_pdt/blocked_no_order_id) ALSO
      # opens a PaperTrade tagged paper_shadow_of_alert_id. Default off
      # in app/config.py; flip to 1 here for the production canary run.
      - CHILI_AUTOTRADER_PAPER_SHADOW_ENABLED=1
      # Measured Pilot: allow bounded confirming-pattern scale-ins. The
      # fraction, max notional, and per-trade add cap stay in named settings.
      - CHILI_AUTOTRADER_SYNERGY_ENABLED=${CHILI_AUTOTRADER_SYNERGY_ENABLED:-true}
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./app:/app/app
      # Round-19 (2026-04-30): mount scripts/ -- workers loading scripts/*.py would otherwise run baked-in copies.
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        # Tight envelope to surface leaks early. Autotrader tick is small —
        # if it hits 3G, something is wrong.
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Phase F1 (2026-05-01): fast-data-worker — Coinbase WebSocket
  # ingestion for crypto scalping. See docs/ARCHITECTURE-fast-path.md
  # for the contract. Runs alongside the swing brain; neither depends
  # on the other for liveness. Default off — set
  # CHILI_FAST_PATH_ENABLED=1 to actually subscribe to Coinbase WS.
  # Opt-in via the fast-path profile; when enabled it parks every pair in
  # state=paused unless CHILI_FAST_PATH_ENABLED is true.
  fast-data-worker:
    image: chili-app:local
    profiles:
      - fast-path
    restart: "${CHILI_FAST_PATH_WORKER_RESTART_POLICY:-no}"
    labels:
      com.chili.service: fast-data-worker
      com.chili.entrypoint: fast_data_worker
    command: ["python", "scripts/fast_data_worker.py"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - CHILI_RUNNING_IN_DOCKER=1
      - PYTHONUNBUFFERED=1
      # Default OFF in compose; .env or shell can flip via interpolation.
      # F1 smoke test enabled 2026-05-01 — set CHILI_FAST_PATH_ENABLED=0
      # in .env (or unset) to disable without editing this file.
      - CHILI_FAST_PATH_ENABLED=${CHILI_FAST_PATH_ENABLED:-1}
      - CHILI_FAST_PATH_MODE=paper
      # CHILI_FAST_PATH_PAIRS intentionally has no compose default.
      # Set it explicitly only for configured-pair rollback/testing; the
      # production scalp universe is selected from fast_path_universe.
      # Profitability guardrails: keep paper mode, but use maker-style
      # fills and the dynamic cost gate unless the operator overrides.
      - CHILI_FAST_PATH_EXECUTION_MODE=${CHILI_FAST_PATH_EXECUTION_MODE:-maker_only}
      - CHILI_FAST_PATH_COST_AWARE_ADMISSION_ENABLED=${CHILI_FAST_PATH_COST_AWARE_ADMISSION_ENABLED:-1}
      - CHILI_FAST_PATH_COST_AWARE_LIVE_FEE_ENABLED=${CHILI_FAST_PATH_COST_AWARE_LIVE_FEE_ENABLED:-1}
      - CHILI_FAST_PATH_COST_AWARE_TAKER_FEE_BPS=${CHILI_FAST_PATH_COST_AWARE_TAKER_FEE_BPS:-60}
      - CHILI_FAST_PATH_COST_AWARE_MAKER_FEE_BPS=${CHILI_FAST_PATH_COST_AWARE_MAKER_FEE_BPS:-40}
      - CHILI_FAST_PATH_UNIVERSE_SHADOW_PAPER_FILLS_ENABLED=${CHILI_FAST_PATH_UNIVERSE_SHADOW_PAPER_FILLS_ENABLED:-1}
      - CHILI_FAST_PATH_UNIVERSE_SHADOW_TERMINAL_REPROBE_ENABLED=${CHILI_FAST_PATH_UNIVERSE_SHADOW_TERMINAL_REPROBE_ENABLED:-1}
      - CHILI_FAST_PATH_UNIVERSE_SHADOW_CAPACITY_PROBE_ENABLED=${CHILI_FAST_PATH_UNIVERSE_SHADOW_CAPACITY_PROBE_ENABLED:-1}
      - CHILI_FAST_PATH_MAKER_CANCEL_ON_TIMEOUT_S=${CHILI_FAST_PATH_MAKER_CANCEL_ON_TIMEOUT_S:-10}
      - CHILI_FAST_PATH_MAKER_FIRST_TAKER_FALLBACK_S=${CHILI_FAST_PATH_MAKER_FIRST_TAKER_FALLBACK_S:-5}
      - CHILI_FAST_PATH_QUEUE_MAX=10000
      - CHILI_FAST_PATH_BATCH_SIZE=50
      - CHILI_FAST_PATH_BATCH_INTERVAL_MS=200
      - CHILI_FAST_PATH_BAR_WINDOW=500
      - CHILI_FAST_PATH_BOOK_DEPTH=25
      - CHILI_FAST_PATH_CB_THRESHOLD=5
      - CHILI_FAST_PATH_HEALTHZ_PORT=8090
    volumes:
      - D:/CHILI-Docker/chili-data:/app/data
      - ./app:/app/app
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz').read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5m
    deploy:
      resources:
        # Per architecture doc: 512MB hard limit, 1 CPU. Fast-data is
        # tiny (5 pairs × 1m bars + L2). RSS should sit ~120-180MB.
        # If it hits the cap, something is leaking — surface it loud.
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  # Opt-in target for moving Postgres off the Windows bind mount. The default
  # remains D:/CHILI-Docker/postgres until CHILI_POSTGRES_DATA_SOURCE is set.
  chili-postgres-data:
  # Existing Docker volume containing the Robinhood Agentic token material.
  # Mounted read-only by the opt-in momentum execution worker.
  chili_rh_agentic_secrets:
    external: true
