# CHILI full stack — see docs/DOCKER_FULL_STACK.md
#
# Logical groups (single file, no extra infra for neural mesh v1):
#   1) Foundation: postgres, ollama
#   2) App / control plane: chili (FastAPI), brain (HTTP delegate)
#   3) Orchestration: scheduler-worker (APScheduler + market snapshots, etc.)
#   4) Neural processing: brain-worker — ``lean-cycle`` (full learning cycle + optional Postgres
#      activation batch when TRADING_BRAIN_NEURAL_MESH_ENABLED=1). For queue-only soak use
#      ``--mode activation-loop`` (see scripts/brain_worker.py).
#   5) Specialized execution (profile ``workers``): mining-worker, backtest-worker, fast-scan-worker
#      — each uses the matching ``brain_worker.py --mode`` (mining / backtest / fast-scan).
services:
  postgres:
    # Keep in sync with typical dev installs (e.g. local Postgres 16); simplifies pg_dump/restore.
    image: postgres:16-alpine
    # Headroom for chili + brain + brain-worker; process-pool queue uses P * (child pool) connections.
    command: ["postgres", "-c", "max_connections=350"]
    environment:
      POSTGRES_USER: chili
      POSTGRES_PASSWORD: chili
      POSTGRES_DB: chili
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host port 5433 avoids clashing with a local PostgreSQL on 5432.
      # From the host: postgresql://chili:chili@localhost:5433/chili
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chili -d chili"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # ollama image has no curl/wget; use CLI against the local daemon
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  # Planner coding validation (Phase 1+): for Docker dev parity, use the Phase 4 mount below
  # (/workspace) + CODE_BRAIN_REPOS=/workspace. For prod-like runs, omit the repo mount and bake
  # paths intentionally; do not rely on host bind mounts outside local dev.
  #
  # After changing app/*.py or app/services/*, either: ``docker compose build chili`` or rely on
  # the ./app bind mount below (local dev). Stale images ignore CHILI_SCHEDULER_ROLE=none handling.
  chili:
    build: .
    image: chili-app:local
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Must use service hostname `postgres`; overrides DATABASE_URL from .env when using Compose.
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      # LOCAL DEV ONLY — overrides host .env paths that do not exist inside Linux containers.
      # Must match the read-only checkout mount target below (/workspace).
      - CODE_BRAIN_REPOS=/workspace
      # HTTPS in the container (self-signed). Hardcoded so host .env cannot accidentally
      # set CHILI_TLS=0 and break https:// in the browser (PR_END_OF_FILE_ERROR).
      # For plain HTTP in Docker, use: docker compose run -e CHILI_TLS=0 … or a compose override.
      - CHILI_TLS=1
      # Scanner/prescreener batch OHLCV: Massive-only (no Polygon/yfinance log spam).
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=false
      # No APScheduler in Uvicorn: all cron jobs run in ``scheduler-worker`` (see CHILI_SCHEDULER_ROLE there).
      # Also disables Massive WebSocket in this process (continuous quote stream); trading UI uses REST polling.
      - CHILI_SCHEDULER_ROLE=none
      # Trading Brain desk: neural mesh graph + APIs (overrides host .env when unset/false).
      - TRADING_BRAIN_NEURAL_MESH_ENABLED=1
      - TRADING_BRAIN_GRAPH_MODE=neural
    volumes:
      - chili_data:/app/data
      - ./docs:/app/docs
      # LOCAL DEV — mount Python package so scheduler/WS-off fixes apply without ``docker build``.
      - ./app:/app/app
      # Phase 4 LOCAL DEV ONLY — read-only host checkout at /workspace for in-container coding
      # validation (CODE_BRAIN_REPOS=/workspace). Omit for production-like deploys. Do not widen
      # to read-write unless a concrete validator step proves write is required (Phase 4 blocker).
      - .:/workspace:ro
      # Brain Worker UI controls the separate ``brain-worker`` service — needs engine access
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # Brain HTTP service (strangler — see chili-brain/README.md)
  brain:
    build:
      context: .
      dockerfile: chili-brain/Dockerfile
    image: chili-brain:local
    ports:
      - "8090:8090"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - CHILI_BRAIN_INTERNAL_SECRET=${CHILI_BRAIN_INTERNAL_SECRET:-changeme}
    volumes:
      - chili_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # Neural processing (default): full ``run_learning_cycle`` + subtasks; optional neural mesh batch
  # after each successful cycle when TRADING_BRAIN_NEURAL_MESH_ENABLED=1.
  brain-worker:
    image: chili-app:local
    command: ["python", "scripts/brain_worker.py", "--mode", "lean-cycle", "--interval", "5"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - CHILI_USE_BRAIN_SERVICE=${CHILI_USE_BRAIN_SERVICE:-0}
      - BRAIN_SERVICE_URL=${BRAIN_SERVICE_URL:-http://brain:8090}
      - BRAIN_INTERNAL_SECRET=${CHILI_BRAIN_INTERNAL_SECRET:-changeme}
      - DATABASE_POOL_SIZE=8
      - DATABASE_MAX_OVERFLOW=12
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=false
      - TRADING_BRAIN_NEURAL_MESH_ENABLED=1
      - TRADING_BRAIN_GRAPH_MODE=neural
    volumes:
      - chili_data:/app/data
      - ./app:/app/app
    depends_on:
      chili:
        condition: service_started
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Continuous pattern mining worker. Discovers new ScanPatterns and feeds the backtest queue.
  mining-worker:
    image: chili-app:local
    command: ["python", "scripts/brain_worker.py", "--mode", "mining"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - DATABASE_POOL_SIZE=4
      - DATABASE_MAX_OVERFLOW=6
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=false
    volumes:
      - chili_data:/app/data
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Continuous backtest worker. Drains the ScanPattern queue with walk-forward backtests.
  backtest-worker:
    image: chili-app:local
    command: ["python", "scripts/brain_worker.py", "--mode", "backtest"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - DATABASE_POOL_SIZE=6
      - DATABASE_MAX_OVERFLOW=10
      - BRAIN_QUEUE_BACKTEST_EXECUTOR=${BRAIN_QUEUE_BACKTEST_EXECUTOR:-process}
      - BRAIN_QUEUE_PROCESS_CAP=${BRAIN_QUEUE_PROCESS_CAP:-8}
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=false
    volumes:
      - chili_data:/app/data
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 3G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Fast scan worker. 1-5 min breakout/momentum detection on promoted patterns, fires alerts.
  fast-scan-worker:
    image: chili-app:local
    command: ["python", "scripts/brain_worker.py", "--mode", "fast-scan"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - DATABASE_POOL_SIZE=4
      - DATABASE_MAX_OVERFLOW=4
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=false
    volumes:
      - chili_data:/app/data
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - workers
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # All APScheduler jobs (broker sync, scans, code/reasoning cycles, …). ``chili`` uses role ``none``.
  scheduler-worker:
    image: chili-app:local
    command: ["python", "scripts/scheduler_worker.py"]
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://chili:chili@postgres:5432/chili
      - OLLAMA_HOST=http://ollama:11434
      - CHILI_SCHEDULER_ROLE=all
      - CHILI_SCHEDULER_EMIT_HEARTBEAT=1
      - DATABASE_POOL_SIZE=8
      - DATABASE_MAX_OVERFLOW=12
      - MARKET_DATA_ALLOW_PROVIDER_FALLBACK=false
      - TRADING_BRAIN_NEURAL_MESH_ENABLED=1
      - TRADING_BRAIN_GRAPH_MODE=neural
    volumes:
      - chili_data:/app/data
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  chili_data:
  postgres_data:
