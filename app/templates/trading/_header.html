<!-- Header -->
<div class="t-header">
  <div style="display:flex;align-items:center;gap:8px;min-width:0">
    <button class="mobile-toggle" onclick="toggleSidebar()" title="Watchlist" aria-label="Toggle watchlist">&#x2630;</button>
    <button type="button" class="t-nav-menu-btn" onclick="toggleTradingMobileNav()" aria-label="Menu" aria-expanded="false">&#9776;</button>
    <h1>&#x1F4C8; CHILI Trading</h1>
  </div>
  <nav id="t-main-nav" class="t-main-nav">
    <a href="/">Home</a>
    <a href="/chat">Chat</a>
    <a href="/trading" style="color:var(--accent)">Trading</a>
    <a href="/trading/autopilot">Autopilot</a>
    <a href="/trading-backup">Backup</a>
    <a href="/brain">Brain</a>
    {% if not is_guest %}<a href="/marketplace">Marketplace</a>{% endif %}
  </nav>
  <div class="t-header-actions">
    <button id="theme-toggle-t" onclick="toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer;color:var(--text);font-size:16px">&#127769;</button>
  </div>
</div>
<style>
.t-nav-menu-btn {
  display: none; background: none; border: 1px solid var(--border); border-radius: 8px;
  font-size: 16px; padding: 4px 8px; cursor: pointer; color: var(--text);
  min-height: 36px; min-width: 36px; align-items: center; justify-content: center;
}
@media (max-width: 768px) {
  .t-nav-menu-btn { display: inline-flex; }
  .t-main-nav {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    background: var(--bg-header); border-bottom: 1px solid var(--border);
    flex-direction: column; padding: 4px 0; z-index: 250;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
  }
  .t-main-nav.open { display: flex; }
  .t-main-nav a {
    padding: 12px 20px !important; font-size: 14px !important;
    border-bottom: 1px solid var(--border); min-height: 44px;
    display: flex !important; align-items: center; color: var(--text-secondary);
    text-decoration: none;
  }
  .t-main-nav a:last-child { border-bottom: none; }
  .t-main-nav a[style*="color:var(--accent)"] { color: var(--accent) !important; font-weight: 600; }
}
</style>
<script>
function toggleTradingMobileNav() {
  var nav = document.getElementById('t-main-nav');
  var btn = document.querySelector('.t-nav-menu-btn');
  var open = nav.classList.toggle('open');
  btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  btn.innerHTML = open ? '&#10005;' : '&#9776;';
}
document.addEventListener('click', function(e) {
  var nav = document.getElementById('t-main-nav');
  var btn = document.querySelector('.t-nav-menu-btn');
  if (nav && nav.classList.contains('open') && !nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
    btn.innerHTML = '&#9776;';
  }
});
</script>
