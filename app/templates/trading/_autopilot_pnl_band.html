<div id="ap-pnl-band" class="ap-pnl-band" role="region" aria-label="P&amp;L command band">
  <div class="ap-pnl-band__zone ap-pnl-band__hero" id="ap-pnl-hero">
    <div class="ap-pnl-band__label">LIVE — TODAY <span class="ap-pnl-band__label-sub">(since 00:00 ET)</span></div>
    <div class="ap-pnl-band__big" id="ap-pnl-hero-total">&mdash;</div>
    <div class="ap-pnl-band__sub" id="ap-pnl-hero-sub">Loading&hellip;</div>
  </div>
  <div class="ap-pnl-band__zone ap-pnl-band__risk" id="ap-pnl-risk">
    <div class="ap-pnl-band__label">RISK</div>
    <div class="ap-pnl-band__risk-line" id="ap-pnl-risk-line">&mdash;</div>
    <div class="ap-pnl-band__sub" id="ap-pnl-risk-sub"></div>
  </div>
  <div class="ap-pnl-band__zone ap-pnl-band__fenced" id="ap-pnl-fenced">
    <div class="ap-pnl-chip" id="ap-pnl-chip-paper">
      <span class="ap-pnl-chip__name">PAPER</span>
      <span class="ap-pnl-chip__val" id="ap-pnl-paper-val">&mdash;</span>
      <span class="ap-pnl-chip__sub" id="ap-pnl-paper-sub"></span>
    </div>
    <div class="ap-pnl-chip ap-pnl-chip--alpaca" id="ap-pnl-chip-alpaca">
      <span class="ap-pnl-chip__name">ALPACA SOAK</span>
      <span class="ap-pnl-chip__val" id="ap-pnl-alpaca-val">&mdash;</span>
      <span class="ap-pnl-chip__sub" id="ap-pnl-alpaca-sub"></span>
    </div>
  </div>
  <div class="ap-pnl-band__asof" id="ap-pnl-asof">&mdash;</div>
</div>
