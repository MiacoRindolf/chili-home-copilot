<!--
  Runtime tab redesign 2026-05-23 (Phase B): the <section> wrapper and the table
  markup have moved into _trading_diagnostics_drawer.html. Only the polling IIFE
  remains here; it targets ids via getElementById, so location of the markup
  (drawer vs activity card) is irrelevant.

  The IIFE also writes the at-a-glance headlines used outside the drawer:
    - #bx-queue-pill-text / #bx-queue-pill-dot          (sticky header)
    - #bx-pattern-gate-summary-text                     (activity card)
-->
<script>
(function () {
  if (window.brainRuntimeGates) return;

  var POLL_MS = 10000;
  var _timer = null;
  var _currentView = 'stuck';

  function _fmtAge(sec) {
    sec = Number(sec) || 0;
    if (sec <= 0) return '0s';
    if (sec < 60) return sec + 's';
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    if (m < 60) return m + 'm ' + s + 's';
    var h = Math.floor(m / 60);
    var mr = m % 60;
    return h + 'h ' + mr + 'm';
  }

  function _fmtNumber(v, digits) {
    if (v === null || v === undefined) return '--';
    var n = Number(v);
    if (!isFinite(n)) return '--';
    return n.toFixed(digits === undefined ? 3 : digits);
  }

  function _verdictBadge(v) {
    if (v === null || v === undefined) return '<span style="color:var(--text-muted)">--</span>';
    var color = v ? '#22c55e' : '#f87171';
    var text = v ? 'PASS' : 'FAIL';
    return '<span style="color:' + color + ';font-weight:600">' + text + '</span>';
  }

  function _setHealthDot(level) {
    var el = document.getElementById('brain-dispatch-queue-health-dot');
    if (el) {
      var color = level === 'red' ? '#f87171'
                : level === 'yellow' ? '#facc15'
                : '#22c55e';
      el.style.background = color;
    }
    /* Activity-card header pill mirror */
    var pillDot = document.getElementById('bx-queue-pill-dot');
    if (pillDot) {
      pillDot.classList.remove('green', 'yellow', 'red');
      pillDot.classList.add(level === 'red' ? 'red' : level === 'yellow' ? 'yellow' : 'green');
    }
  }

  function _escape(s) {
    if (s === null || s === undefined) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function _shortDate(iso) {
    if (!iso) return '--';
    try {
      return new Date(iso).toLocaleString();
    } catch (_) { return iso; }
  }

  function refreshPatterns() {
    var status = document.getElementById('brain-pattern-gate-status');
    if (status) status.textContent = 'Loading...';

    var stuckPromise = fetch('/api/brain/patterns/ptr-ready-but-ungated', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var tbody = document.getElementById('brain-pattern-gate-stuck-tbody');
        if (tbody) {
          if (!d || d.ok === false) {
            tbody.innerHTML = '<tr><td colspan="4" style="padding:6px;color:#f87171">Error: ' + _escape((d && d.error) || 'unknown') + '</td></tr>';
          } else {
            var rows = d.patterns || [];
            if (!rows.length) {
              tbody.innerHTML = '<tr><td colspan="4" style="padding:6px;color:var(--text-muted)">No stuck patterns. (' + _escape(d.count) + ' total)</td></tr>';
            } else {
              tbody.innerHTML = rows.map(function (p) {
                return '<tr style="border-bottom:1px solid var(--border-faint,rgba(0,0,0,.05))">' +
                  '<td style="padding:4px 6px">' + _escape(p.name) + ' <span style="color:var(--text-muted)">#' + _escape(p.pattern_id) + '</span></td>' +
                  '<td style="padding:4px 6px">' + _escape(p.lifecycle_stage || '--') + '</td>' +
                  '<td style="padding:4px 6px;text-align:right">' + _escape(p.ptr_rows) + '</td>' +
                  '<td style="padding:4px 6px">' + _escape(_shortDate(p.last_backtest_at)) + '</td>' +
                  '</tr>';
              }).join('');
            }
          }
        }
        return d || {};
      })
      .catch(function () {
        var tbody = document.getElementById('brain-pattern-gate-stuck-tbody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="4" style="padding:6px;color:#f87171">Fetch failed</td></tr>';
        return {};
      });

    var diffPromise = fetch('/api/brain/patterns/cpcv-verdict-diff', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var tbody = document.getElementById('brain-pattern-gate-diff-tbody');
        var summary = document.getElementById('brain-pattern-gate-diff-summary');
        if (tbody) {
          if (!d || d.ok === false) {
            tbody.innerHTML = '<tr><td colspan="8" style="padding:6px;color:#f87171">Error: ' + _escape((d && d.error) || 'unknown') + '</td></tr>';
            if (summary) summary.textContent = '';
          } else {
            if (summary) {
              summary.innerHTML = 'Agree: <strong>' + _escape(d.agree) + '</strong>' +
                                  ' &middot; Disagree: <strong style="color:' + (d.disagree ? '#facc15' : 'inherit') + '">' + _escape(d.disagree) + '</strong>' +
                                  ' &middot; Total: <strong>' + _escape(d.count) + '</strong>';
            }
            var rows = d.patterns || [];
            if (!rows.length) {
              tbody.innerHTML = '<tr><td colspan="8" style="padding:6px;color:var(--text-muted)">No adaptive-eval data. (Flag may be off.)</td></tr>';
            } else {
              tbody.innerHTML = rows.map(function (p) {
                var paretoTxt = p.pareto_dominant === null ? '--'
                              : (p.pareto_dominant ? 'yes' : 'no');
                return '<tr style="border-bottom:1px solid var(--border-faint,rgba(0,0,0,.05))">' +
                  '<td style="padding:4px 6px">' + _escape(p.name) + ' <span style="color:var(--text-muted)">#' + _escape(p.pattern_id) + '</span></td>' +
                  '<td style="padding:4px 6px">' + _verdictBadge(p.legacy_pass) + '</td>' +
                  '<td style="padding:4px 6px">' + _verdictBadge(p.adaptive_pass) + '</td>' +
                  '<td style="padding:4px 6px;text-align:right">' + _escape(_fmtNumber(p.shrunken_dsr)) + '</td>' +
                  '<td style="padding:4px 6px;text-align:right">' + _escape(_fmtNumber(p.shrunken_pbo)) + '</td>' +
                  '<td style="padding:4px 6px;text-align:right">' + _escape(_fmtNumber(p.shrunken_med_sharpe)) + '</td>' +
                  '<td style="padding:4px 6px;text-align:right">' + _escape(_fmtNumber(p.composite_score, 3)) + '</td>' +
                  '<td style="padding:4px 6px">' + _escape(paretoTxt) + '</td>' +
                  '</tr>';
              }).join('');
            }
          }
        }
        return d || {};
      })
      .catch(function () {
        var tbody = document.getElementById('brain-pattern-gate-diff-tbody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="8" style="padding:6px;color:#f87171">Fetch failed</td></tr>';
        return {};
      });

    return Promise.all([stuckPromise, diffPromise]).then(function (results) {
      var stuckData = results[0] || {};
      var diffData  = results[1] || {};
      var stuckCount = (stuckData.patterns && stuckData.patterns.length) || 0;
      var disagree   = diffData.disagree || 0;

      var summaryText = document.getElementById('bx-pattern-gate-summary-text');
      if (summaryText) {
        summaryText.innerHTML = 'Pattern gates &mdash; ' + stuckCount + ' stuck &middot; ' + disagree + ' disagree';
      }

      var st = document.getElementById('brain-pattern-gate-status');
      if (st) st.textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
    });
  }

  function refreshQueueDepth() {
    fetch('/api/brain/dispatch-queue-depth', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        var tbody = document.getElementById('brain-dispatch-queue-tbody');
        if (!d || d.ok === false) {
          if (tbody) tbody.innerHTML = '<tr><td colspan="5" style="padding:6px;color:#f87171">Error: ' + _escape((d && d.error) || 'unknown') + '</td></tr>';
          _setHealthDot('red');
          return;
        }
        var totals = d.totals || {};
        var setText = function (id, v) {
          var el = document.getElementById(id);
          if (el) el.textContent = String(v == null ? 0 : v);
        };
        setText('brain-dq-total-pending',    totals.pending);
        setText('brain-dq-total-processing', totals.processing);
        setText('brain-dq-total-retry',      totals.retry_wait);
        setText('brain-dq-total-dead',       totals.dead);

        _setHealthDot(d.health || 'green');
        var oldestEl = document.getElementById('brain-dispatch-queue-oldest');
        if (oldestEl) {
          oldestEl.textContent = 'oldest unfinished: ' + _fmtAge(d.oldest_pending_age_seconds);
        }
        var upd = document.getElementById('brain-dispatch-queue-updated');
        if (upd) upd.textContent = 'updated ' + new Date().toLocaleTimeString();

        /* Sticky header pill mirror */
        var pillText = document.getElementById('bx-queue-pill-text');
        if (pillText) {
          var pendN = (totals.pending == null ? 0 : Number(totals.pending));
          pillText.textContent = 'Queue ' + pendN + ' pending';
        }

        var buckets = d.buckets || [];
        if (tbody) {
          if (!buckets.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="padding:6px;color:var(--text-muted)">Queue empty.</td></tr>';
          } else {
            tbody.innerHTML = buckets.map(function (b) {
              return '<tr style="border-bottom:1px solid var(--border-faint,rgba(0,0,0,.05))">' +
                '<td style="padding:4px 6px">' + _escape(b.event_type) + '</td>' +
                '<td style="padding:4px 6px">' + _escape(b.event_kind) + '</td>' +
                '<td style="padding:4px 6px">' + _escape(b.status) + '</td>' +
                '<td style="padding:4px 6px;text-align:right">' + _escape(b.count) + '</td>' +
                '<td style="padding:4px 6px;text-align:right">' + _escape(_fmtAge(b.oldest_age_seconds)) + '</td>' +
                '</tr>';
            }).join('');
          }
        }
      })
      .catch(function () {
        var tbody = document.getElementById('brain-dispatch-queue-tbody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" style="padding:6px;color:#f87171">Fetch failed</td></tr>';
        _setHealthDot('red');
      });
  }

  function switchView(which) {
    if (which !== 'stuck' && which !== 'diff') return;
    _currentView = which;
    var stuck = document.getElementById('brain-pattern-gate-view-stuck');
    var diff  = document.getElementById('brain-pattern-gate-view-diff');
    if (stuck) stuck.style.display = (which === 'stuck' ? '' : 'none');
    if (diff)  diff.style.display  = (which === 'diff'  ? '' : 'none');
    document.querySelectorAll('.brain-runtime-gates-tab').forEach(function (btn) {
      var on = btn.getAttribute('data-pgate-view') === which;
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-selected', on ? 'true' : 'false');
    });
  }

  function start() {
    refreshQueueDepth();
    refreshPatterns();
    if (_timer) clearInterval(_timer);
    _timer = setInterval(refreshQueueDepth, POLL_MS);
  }

  window.brainRuntimeGates = {
    refreshPatterns: refreshPatterns,
    refreshQueueDepth: refreshQueueDepth,
    switchView: switchView,
    start: start,
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
