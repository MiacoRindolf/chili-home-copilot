<!DOCTYPE html>
<html lang="en">
<head>
  <title>{% block title %}CHILI Home Copilot{% endblock %}</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <style>
    :root {
      --bg: #f8fafc; --bg-header: #fff; --bg-input-bar: #fff;
      --bg-msg-assist: #fff; --border: #e2e8f0; --text: #0f172a;
      --text-secondary: #64748b; --text-muted: #94a3b8;
      --input-border: #cbd5e1; --input-bg: #fff;
      --code-bg: #f1f5f9;
      --accent: #2563eb; --accent-hover: #1d4ed8; --accent-disabled: #93c5fd;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
      --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --bg-header: #1e293b; --bg-input-bar: #1e293b;
      --bg-msg-assist: #1e293b; --border: #334155; --text: #f1f5f9;
      --text-secondary: #94a3b8; --text-muted: #64748b;
      --input-border: #475569; --input-bg: #0f172a;
      --code-bg: #334155;
      --accent: #3b82f6; --accent-hover: #2563eb; --accent-disabled: #1e40af;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                   'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background .2s, color .2s;
      line-height: 1.5;
    }
    ::selection { background: rgba(37,99,235,.2); }
    a { color: var(--accent); }
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
  <script>
    (function(){var t=localStorage.getItem('chili-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>
  {% block head_extra %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
