name: chili_mobile
description: "Native Flutter client for CHILI Home Copilot"
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  lottie: ^3.1.2
  window_manager: ^0.2.9
  screen_retriever: ^0.1.9
  record: ^6.0.0
  ffi: ^2.1.0
  audioplayers: ^6.4.0
  desktop_drop: ^0.4.4
  tray_manager: ^0.2.2
  local_notifier: ^0.1.6
  hotkey_manager: ^0.2.3
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.2.2
  flutter_markdown: ^0.7.4+3
  url_launcher: ^6.3.1
  file_picker: ^8.0.0
  pasteboard: ^0.2.0
  http_parser: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  inno_build: ^0.4.0

# inno_build: app_id used for Windows installer (Add/Remove Programs).
# Generate a new one with: dart run inno_build --app-id
inno_build:
  app_id: "B7E3A1C9-4D2F-4E8A-9B1C-0F3D5E7A9B2C"

flutter:
  uses-material-design: true
  assets:
    - assets/animations/chili_idle.json
    - assets/animations/chili_listening.json
    - assets/animations/chili_thinking.json
    - assets/animations/chili_speaking.json
    - assets/chili_mascot.png
