name: chili_mobile
description: "Native Flutter client for CHILI Home Copilot"
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  lottie: ^3.1.2
  window_manager: ^0.2.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/chili_idle.json
    - assets/animations/chili_listening.json
    - assets/animations/chili_thinking.json
    - assets/animations/chili_speaking.json
